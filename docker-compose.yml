services:
  videowall-header:
    build: .
    container_name: videowall-header
    restart: unless-stopped
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      WEATHER_LAT: ${WEATHER_LAT:-28.1235}
      WEATHER_LON: ${WEATHER_LON:--15.4363}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - weather-cache:/var/www/html/cache

volumes:
  weather-cache:
